name: Harness Regression

on:
  pull_request:
    branches: [main]
    paths:
      - "harness/**"
      - "scripts/**"
      - "src/app/api/**"
      - "java/agent-service/**"
      - ".github/workflows/harness.yml"
  workflow_dispatch:
    inputs:
      enable_fault:
        description: "Run fault-injection stage"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      enable_llm:
        description: "Run LLM stage"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  harness:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HARNESS_BASE_URL: http://localhost:3000
      HARNESS_USERNAME: ${{ secrets.HARNESS_USERNAME }}
      HARNESS_PASSWORD: ${{ secrets.HARNESS_PASSWORD }}
      HARNESS_ENABLE_FAULT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_fault || 'false' }}
      HARNESS_ENABLE_LLM: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_llm || 'false' }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      HARNESS_FAULT_INJECTION_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Start Next + Java
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "npm" -ArgumentList "run dev:all" -PassThru
          "DEV_ALL_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Wait for app ready
        shell: pwsh
        run: |
          $ok = $false
          for ($i = 0; $i -lt 90; $i++) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:3000/api/auth/session" -Method GET -TimeoutSec 5
              if ($r.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {}
          }
          if (-not $ok) { throw "App not ready within timeout." }

      - name: Run Harness CI
        run: npm run harness:ci

      - name: Stop background services
        if: always()
        shell: pwsh
        run: |
          if ($env:DEV_ALL_PID) {
            try { Stop-Process -Id ([int]$env:DEV_ALL_PID) -Force -ErrorAction SilentlyContinue } catch {}
          }

